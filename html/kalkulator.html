<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator</title>
   <link rel="stylesheet" href="styleK">
</head>
<body>

    <div class="calculator-card">
        <h1>Kalkulator</h1>
        
        <div id="screen">0</div>

        <div class="buttons-grid" id="btn-container">
            <button class="clear">C</button>
            <button class="operator">/</button>
            <button class="operator">*</button>
            <button class="operator">-</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">+</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="equals">=</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>
            <button class="backspace"><</button>
        </div>
    </div>

   <script src="scriptK"></script>
</body>
</html>
